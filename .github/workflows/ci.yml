name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: truffels-api
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: truffels-api/go.sum
      - run: go mod download
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: truffels-api
      - run: go build -o /dev/null .
      - run: go test -v -count=1 -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: truffels-api/coverage.out

  agent:
    name: Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: truffels-agent
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: truffels-agent
      - run: go build -o /dev/null .
      - run: go test -v -count=1 -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: agent-coverage
          path: truffels-agent/coverage.out

  web:
    name: Web (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: truffels-web
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm test
      - run: pnpm build

  install:
    name: Install Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install BATS and ShellCheck
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck
      - name: ShellCheck
        run: shellcheck install.sh
      - name: BATS tests
        run: bats tests/install.bats
